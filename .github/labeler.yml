"area: services":
  - changed-files:
    - any-glob-to-any-file: "services/**"

"area: ui":
  - changed-files:
    - any-glob-to-any-file:
      - "entrypoints/**"
      - "components/**"

"area: tests":
  - changed-files:
    - any-glob-to-any-file: "tests/**"

"area: i18n":
  - changed-files:
    - any-glob-to-any-file: "public/_locales/**"

"area: config":
  - changed-files:
    - any-glob-to-any-file:
      - "*.config.*"
      - "package.json"
      - "yarn.lock"
      - ".github/**"

"area: docs":
  - changed-files:
    - any-glob-to-any-file:
      - "*.md"
      - "docs/**"

"area: release":
  - changed-files:
    - any-glob-to-any-file: ".github/workflows/release.yml"
