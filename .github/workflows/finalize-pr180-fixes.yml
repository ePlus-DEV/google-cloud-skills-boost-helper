name: Finalize PR 180 targeted fixes

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.ref == 'revert-178-dev' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.sha == '607e17e99ebca044962e5654c7e916fc8ad50bdc'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: revert-178-dev
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Sync latest main history
        run: |
          git config user.name "eplus-bot"
          git config user.email "157664013+eplus-bot@users.noreply.github.com"
          git fetch origin main
          git merge --no-commit --no-ff origin/main

      - name: Apply targeted fixes
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/apply-pr180-critical-fixes.yml').read_text()
          marker = "          python <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          lines = workflow[start:end].splitlines()
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in lines) + "\n"
          block_start = script.index("old_image_check = '''")
          block_end_marker = "text = text.replace(old_image_check, new_image_check)\n"
          block_end = script.index(block_end_marker, block_start) + len(block_end_marker)
          script = script[:block_start] + script[block_end:]
          script = script.replace(
              "gsp_pattern.subn(gsp_replacement, text, count=1)",
              "gsp_pattern.subn(lambda _match: gsp_replacement, text, count=1)",
          )
          Path('/tmp/apply-pr180.py').write_text(script)
          PY
          python /tmp/apply-pr180.py

      - name: Install and validate
        run: |
          yarn add dompurify@^3.4.12 --ignore-scripts --ignore-engines
          yarn wxt prepare
          yarn compile
          yarn test:coverage
          yarn build

      - name: Clean temporary files and push
        run: |
          rm -f .github/workflows/apply-pr180-critical-fixes.yml
          rm -f .github/.trigger-pr180-*
          rm -f .github/pr180-fix*.txt .github/pr180-fix*.log .github/pr180-validation.txt
          git add -A
          git commit -m "fix: retain critical security and compatibility fixes"
          git push origin HEAD:revert-178-dev
