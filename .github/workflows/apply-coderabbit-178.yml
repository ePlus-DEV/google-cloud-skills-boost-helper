name: Apply CodeRabbit fixes for PR 178

on:
  push:
    branches: [dev]
    paths:
      - .github/workflows/apply-coderabbit-178.yml

permissions:
  contents: write

jobs:
  apply-fixes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.0
        with:
          ref: dev
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.x
          cache: yarn

      - name: Patch review findings
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              content = file_path.read_text()
              if old not in content:
                  if new in content:
                      return
                  raise RuntimeError(f"Expected block not found in {path}")
              file_path.write_text(content.replace(old, new, 1))

          replace_once(
              ".github/workflows/pr-labeler.yml",
              '''            const { data: files } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
          ''',
              '''            const files = await github.paginate(
                github.rest.pulls.listFiles,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  per_page: 100
                }
              );
          ''',
          )

          replace_once(
              ".github/workflows/stale.yml",
              "      - uses: actions/stale@v9\n",
              "      - uses: actions/stale@28ca1036281a5e5922ead5184a1bbf96e5fc984e # v9.0.0\n",
          )

          readme_path = Path("README.md")
          readme = readme_path.read_text()
          privacy_definition = "[Privacy Policy]: https://eplus.dev/privacy-policy"
          if privacy_definition not in readme:
              marker = "[Manual Installation]: INSTALL.md\n"
              if marker not in readme:
                  raise RuntimeError("README reference block not found")
              readme = readme.replace(
                  marker,
                  f"{marker}{privacy_definition}\n",
                  1,
              )
              readme_path.write_text(readme)

          markdown_path = Path("services/markdownService.ts")
          markdown = markdown_path.read_text()

          old_helpers = '''/**
           * Checks whether a URL uses one of the explicitly allowed schemes.
           * ASCII control characters and whitespace are ignored before parsing.
           */
          function hasAllowedUrlScheme(
            value: string,
            allowedSchemes: ReadonlySet<string>,
          ): boolean {
            const normalized = Array.from(value)
              .filter((character) => {
                const codePoint = character.codePointAt(0);
                return (
                  codePoint !== undefined &&
                  codePoint > 0x20 &&
                  (codePoint < 0x7f || codePoint > 0x9f)
                );
              })
              .join("")
              .trim();
            const scheme = normalized.match(/^([a-z][a-z0-9+.-]*):/i)?.[1];
            return !scheme || allowedSchemes.has(scheme.toLowerCase());
          }
          '''
          new_helpers = '''const LINK_SCHEMES = new Set(["http", "https"]);
          const IMAGE_SCHEMES = new Set(["http", "https", "blob"]);
          const SAFE_DATA_IMAGE_SOURCE =
            /^data:image\\/(?:avif|gif|jpe?g|png|webp);base64,[a-z0-9+/=\\s]+$/iu;

          /** Removes ASCII control characters and whitespace before URL parsing. */
          function normalizeUrlForSchemeCheck(value: string): string {
            return Array.from(value)
              .filter((character) => {
                const codePoint = character.codePointAt(0);
                return (
                  codePoint !== undefined &&
                  codePoint > 0x20 &&
                  (codePoint < 0x7f || codePoint > 0x9f)
                );
              })
              .join("")
              .trim();
          }

          /** Checks whether a URL uses one of the explicitly allowed schemes. */
          function hasAllowedUrlScheme(
            value: string,
            allowedSchemes: ReadonlySet<string>,
          ): boolean {
            const normalized = normalizeUrlForSchemeCheck(value);
            const scheme = normalized.match(/^([a-z][a-z0-9+.-]*):/iu)?.[1];
            return !scheme || allowedSchemes.has(scheme.toLowerCase());
          }

          /** Allows relative, HTTP(S), blob, and safe raster data-image sources. */
          function hasAllowedImageSource(value: string): boolean {
            const normalized = normalizeUrlForSchemeCheck(value);
            return (
              SAFE_DATA_IMAGE_SOURCE.test(normalized) ||
              hasAllowedUrlScheme(value, IMAGE_SCHEMES)
            );
          }
          '''
          if old_helpers not in markdown:
              raise RuntimeError("Markdown URL helper block not found")
          markdown = markdown.replace(old_helpers, new_helpers, 1)

          old_sanitizer = '''  const sanitized = DOMPurify.sanitize(html, {
              ALLOWED_TAGS: MARKDOWN_ALLOWED_TAGS,
              ALLOWED_ATTR: MARKDOWN_ALLOWED_ATTRIBUTES,
              ALLOW_ARIA_ATTR: true,
              ALLOW_DATA_ATTR: false,
              ALLOW_UNKNOWN_PROTOCOLS: false,
            });

            const template = document.createElement("template");
            template.innerHTML = sanitized;

            const linkSchemes = new Set(["http", "https"]);
            template.content.querySelectorAll("a[href]").forEach((element) => {
              const href = element.getAttribute("href") || "";
              if (!hasAllowedUrlScheme(href, linkSchemes)) {
                element.removeAttribute("href");
              }
            });

            const imageSchemes = new Set(["http", "https"]);
            template.content.querySelectorAll("img[src]").forEach((element) => {
              const src = element.getAttribute("src") || "";
              if (!hasAllowedUrlScheme(src, imageSchemes)) {
                element.removeAttribute("src");
              }
            });
          '''
          new_sanitizer = '''  const sanitized = DOMPurify.sanitize(html, {
              ALLOWED_TAGS: MARKDOWN_ALLOWED_TAGS,
              ALLOWED_ATTR: MARKDOWN_ALLOWED_ATTRIBUTES,
              ALLOW_ARIA_ATTR: true,
              ALLOW_DATA_ATTR: false,
              // Preserve candidate custom schemes until the strict checks below run.
              ALLOW_UNKNOWN_PROTOCOLS: true,
            });

            const template = document.createElement("template");
            template.innerHTML = sanitized;

            template.content.querySelectorAll("a").forEach((element) => {
              if (element.getAttribute("target") === "_blank") {
                element.setAttribute("rel", "noopener noreferrer");
              }

              const href = element.getAttribute("href");
              if (href && !hasAllowedUrlScheme(href, LINK_SCHEMES)) {
                element.removeAttribute("href");
              }
            });

            template.content.querySelectorAll("img[src]").forEach((element) => {
              const src = element.getAttribute("src") || "";
              if (!hasAllowedImageSource(src)) {
                element.removeAttribute("src");
              }
            });
          '''
          if old_sanitizer not in markdown:
              raise RuntimeError("Markdown sanitizer block not found")
          markdown = markdown.replace(old_sanitizer, new_sanitizer, 1)

          old_rewrite = '''          if (
                    /^https?:\\/\\//i.test(src) ||
                    /^data:\\//i.test(src) ||
                    /^blob:\\//i.test(src)
                  )
                    return;
          '''
          new_rewrite = '''          const normalizedSrc = src.trim().toLowerCase();
                  if (
                    normalizedSrc.startsWith("http://") ||
                    normalizedSrc.startsWith("https://") ||
                    normalizedSrc.startsWith("data:") ||
                    normalizedSrc.startsWith("blob:")
                  )
                    return;
          '''
          rewrite_count = markdown.count(old_rewrite)
          if rewrite_count != 2:
              raise RuntimeError(f"Expected two image rewrite blocks, found {rewrite_count}")
          markdown = markdown.replace(old_rewrite, new_rewrite)
          markdown_path.write_text(markdown)

          replace_once(
              "services/optionsService.ts",
              '''      await this.switchAccount(newAccount.id);
                await this.loadAccounts();
          ''',
              '''      await this.switchAccount(newAccount.id);
          ''',
          )

          test_path = Path("tests/services/markdownService.test.ts")
          test = test_path.read_text()
          old_fixture = '''      '<a class="safe-link" href="https://example.com/docs">Safe</a>',
                '<a class="mail-link" href="mailto:dev@example.com">Mail</a>',
          '''
          new_fixture = '''      '<a class="safe-link" href="https://example.com/docs">Safe</a>',
                '<a class="blank-link" href="https://example.com/new" target="_blank">Blank</a>',
                '<a class="mail-link" href="mailto:dev@example.com">Mail</a>',
                '<img class="data-image" src="data:image/png;base64,iVBORw0KGgo=">',
                '<img class="blob-image" src="blob:https://example.com/image-id">',
                '<img class="svg-data-image" src="data:image/svg+xml;base64,PHN2Zz4=">',
          '''
          if old_fixture not in test:
              raise RuntimeError("Markdown test fixture block not found")
          test = test.replace(old_fixture, new_fixture, 1)

          old_expectations = '''    expect(document.querySelector(".safe-link")?.getAttribute("href")).toBe(
                "https://example.com/docs",
              );
              expect(document.querySelector(".mail-link")?.hasAttribute("href")).toBe(
                false,
              );
          '''
          new_expectations = '''    expect(document.querySelector(".safe-link")?.getAttribute("href")).toBe(
                "https://example.com/docs",
              );
              const blankLink = document.querySelector(".blank-link");
              expect(blankLink?.getAttribute("rel")?.split(" ")).toEqual(
                expect.arrayContaining(["noopener", "noreferrer"]),
              );
              expect(document.querySelector(".mail-link")?.hasAttribute("href")).toBe(
                false,
              );
              expect(document.querySelector(".data-image")?.getAttribute("src")).toBe(
                "data:image/png;base64,iVBORw0KGgo=",
              );
              expect(document.querySelector(".blob-image")?.getAttribute("src")).toBe(
                "blob:https://example.com/image-id",
              );
              expect(
                document.querySelector(".svg-data-image")?.hasAttribute("src"),
              ).toBe(false);
          '''
          if old_expectations not in test:
              raise RuntimeError("Markdown test expectation block not found")
          test_path.write_text(test.replace(old_expectations, new_expectations, 1))
          PY

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts --ignore-engines

      - name: Prepare WXT types
        run: yarn wxt prepare

      - name: TypeScript compile
        run: yarn compile

      - name: Unit tests with coverage
        run: yarn test:coverage

      - name: Production build
        run: yarn build

      - name: Commit fixes
        shell: bash
        run: |
          git config user.name "ePlus Bot"
          git config user.email "dev@eplus.dev"
          git add \
            .github/workflows/pr-labeler.yml \
            .github/workflows/stale.yml \
            README.md \
            services/markdownService.ts \
            services/optionsService.ts \
            tests/services/markdownService.test.ts
          git rm .github/workflows/apply-coderabbit-178.yml
          git commit -m "fix: address CodeRabbit review findings"
          git push origin HEAD:dev
