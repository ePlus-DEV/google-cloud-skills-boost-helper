name: Apply active account snapshot fix

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: apply-active-account-read-fix-176
  cancel-in-progress: false

jobs:
  apply-fix:
    if: github.head_ref == 'fix/v1.2.15-dev-main-conflict'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.0
        with:
          fetch-depth: 0
          ref: fix/v1.2.15-dev-main-conflict

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.x
          cache: yarn

      - name: Patch active account snapshot flow
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('services/optionsService.ts')
          text = path.read_text()

          start_marker = '  async loadAccounts(): Promise<void> {'
          next_marker = '\n\n  /**\n   * Create account card element'

          if start_marker in text:
              start = text.index(start_marker)
              end = text.index(next_marker, start)
              block = text[start:end]
              block = block.replace(
                  '  async loadAccounts(): Promise<void> {',
                  '  async loadAccounts(): Promise<Account | null> {',
                  1,
              )
              block = block.replace(
                  '    if (!accountsList) return;',
                  '    if (!accountsList) return null;',
                  1,
              )
              if '    return activeAccount;' not in block:
                  block = block.rsplit('\n  },', 1)[0] + '\n\n    return activeAccount;\n  },'
              text = text[:start] + block + text[end:]
          elif '  async loadAccounts(): Promise<Account | null> {' not in text:
              raise RuntimeError('loadAccounts method was not found')

          old = '''      // loadAccounts and getActiveAccount are independent after the update
                const [, activeAccount] = await Promise.all([
                  this.loadAccounts(),
                  AccountService.getActiveAccount(),
                ]);'''
          new = '''      // Reuse the active-account snapshot loaded for the final account-list render.
                const activeAccount = await this.loadAccounts();'''

          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise RuntimeError('Facilitator toggle account-load block was not found')

          path.write_text(text)
          PY

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts --ignore-engines

      - name: Prepare WXT types
        run: yarn wxt prepare

      - name: TypeScript compile
        run: yarn compile

      - name: Unit tests with coverage
        run: yarn test:coverage

      - name: Production build
        run: yarn build

      - name: Commit fix
        shell: bash
        run: |
          git config user.name "ePlus Bot"
          git config user.email "dev@eplus.dev"
          git add services/optionsService.ts

          if git diff --cached --quiet; then
            echo "Active-account snapshot fix is already applied."
            exit 0
          fi

          git commit -m "perf: reuse active account snapshot in options UI"
          git push origin HEAD:fix/v1.2.15-dev-main-conflict
