name: Apply PR 180 DeepSource fixes

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'revert-178-dev' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: revert-178-dev
          fetch-depth: 0

      - name: Check whether patch is pending
        id: gate
        shell: bash
        run: |
          if [ -f .github/scripts/fix-pr180-deepsource.py ]; then
            echo "apply=true" >> "$GITHUB_OUTPUT"
          else
            echo "apply=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v7
        if: steps.gate.outputs.apply == 'true'
        with:
          node-version: 24.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Apply DeepSource fixes
        if: steps.gate.outputs.apply == 'true'
        run: python .github/scripts/fix-pr180-deepsource.py

      - name: Validate
        if: steps.gate.outputs.apply == 'true'
        run: |
          yarn install --frozen-lockfile --ignore-scripts
          yarn wxt prepare
          yarn compile
          yarn test:coverage
          yarn build

      - name: Commit and push
        if: steps.gate.outputs.apply == 'true'
        run: |
          rm -f .github/scripts/fix-pr180-deepsource.py
          rm -f .github/.trigger-pr180-deepsource
          git config user.name "eplus-bot"
          git config user.email "157664013+eplus-bot@users.noreply.github.com"
          git add -A
          git commit -m "fix: address DeepSource JavaScript findings"
          git push origin HEAD:revert-178-dev
