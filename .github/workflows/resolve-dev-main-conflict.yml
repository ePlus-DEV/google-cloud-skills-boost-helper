name: Resolve dev-main conflict

on:
  push:
    branches:
      - fix/v1.2.15-dev-main-conflict

permissions:
  contents: write

jobs:
  resolve:
    name: Merge main while preserving dev cleanup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: fix/v1.2.15-dev-main-conflict

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: yarn

      - name: Merge main and resolve conflicts
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "ePlus Bot"
          git config user.email "dev@eplus.dev"
          git fetch origin main

          set +e
          git merge origin/main --no-ff --no-commit
          merge_status=$?
          set -e

          if [ "$merge_status" -ne 0 ]; then
            mapfile -d '' conflicted_files < <(git diff --name-only --diff-filter=U -z)

            if [ "${#conflicted_files[@]}" -eq 0 ]; then
              echo "Merge failed without conflict files."
              exit "$merge_status"
            fi

            printf 'Keeping dev versions for conflicted files:\n'
            printf ' - %s\n' "${conflicted_files[@]}"
            git checkout --ours -- "${conflicted_files[@]}"
            git add -- "${conflicted_files[@]}"
          fi

      - name: Update only dependencies still used by dev
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));

          const updates = {
            '@tailwindcss/vite': '^4.3.3',
            firebase: '^12.16.0',
            'fuse.js': '^7.5.0',
            marked: '^18.0.6',
          };

          for (const [name, version] of Object.entries(updates)) {
            if (pkg.dependencies?.[name]) {
              pkg.dependencies[name] = version;
            }
          }

          // Keep the newer WXT version already selected on dev.
          if (pkg.devDependencies?.wxt) {
            pkg.devDependencies.wxt = '^0.20.27';
          }

          fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

          # Keep dev workflow behavior and also accept the newer setup-node action from main.
          sed -i 's#actions/setup-node@v6#actions/setup-node@v7#g' \
            .github/workflows/ci.yml \
            .github/workflows/release.yml

          corepack enable
          yarn install --ignore-scripts --ignore-engines

      - name: Validate merged branch
        shell: bash
        run: |
          yarn compile
          yarn test
          yarn build

      - name: Commit resolved merge
        shell: bash
        run: |
          rm -f .github/workflows/resolve-dev-main-conflict.yml
          git add -A

          if git diff --cached --quiet && ! git rev-parse -q --verify MERGE_HEAD >/dev/null; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "chore: resolve dev-main conflict without restoring unused code"
          git push origin HEAD:fix/v1.2.15-dev-main-conflict
