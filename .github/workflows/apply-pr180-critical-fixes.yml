name: Apply PR 180 critical fixes

on:
  push:
    branches: [revert-178-dev]

permissions:
  contents: write

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: revert-178-dev
          fetch-depth: 0

      - name: Apply targeted fixes
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          def replace_once(text: str, old: str, new: str, path: str) -> str:
              if old not in text:
                  raise RuntimeError(f"Expected text not found in {path}: {old[:80]!r}")
              return text.replace(old, new, 1)

          # 1) Restore Markdown sanitization without restoring unrelated v1.2.15 code.
          path = Path("services/markdownService.ts")
          text = path.read_text()
          text = replace_once(
              text,
              'import { marked } from "marked";',
              'import DOMPurify from "dompurify";\nimport { marked } from "marked";',
              str(path),
          )

          sanitizer = r'''
const MARKDOWN_ALLOWED_TAGS = [
  "a",
  "blockquote",
  "br",
  "code",
  "del",
  "details",
  "em",
  "h1",
  "h2",
  "h3",
  "h4",
  "h5",
  "h6",
  "hr",
  "img",
  "li",
  "ol",
  "p",
  "pre",
  "strong",
  "summary",
  "table",
  "tbody",
  "td",
  "th",
  "thead",
  "tr",
  "ul",
];

const MARKDOWN_ALLOWED_ATTRIBUTES = [
  "alt",
  "class",
  "height",
  "href",
  "rel",
  "src",
  "target",
  "title",
  "width",
];

const LINK_SCHEMES = new Set(["http", "https"]);
const IMAGE_SCHEMES = new Set(["http", "https", "blob"]);
const SAFE_DATA_IMAGE_SOURCE =
  /^data:image\/(?:avif|gif|jpe?g|png|webp);base64,[a-z0-9+/=\s]+$/iu;

function normalizeUrlForSchemeCheck(value: string): string {
  return Array.from(value)
    .filter((character) => {
      const codePoint = character.codePointAt(0);
      return (
        codePoint !== undefined &&
        codePoint > 0x20 &&
        (codePoint < 0x7f || codePoint > 0x9f)
      );
    })
    .join("")
    .trim();
}

function hasAllowedUrlScheme(
  value: string,
  allowedSchemes: ReadonlySet<string>,
): boolean {
  const normalized = normalizeUrlForSchemeCheck(value);
  const scheme = normalized.match(/^([a-z][a-z0-9+.-]*):/iu)?.[1];
  return !scheme || allowedSchemes.has(scheme.toLowerCase());
}

function hasAllowedImageSource(value: string): boolean {
  const normalized = normalizeUrlForSchemeCheck(value);
  return (
    SAFE_DATA_IMAGE_SOURCE.test(normalized) ||
    hasAllowedUrlScheme(value, IMAGE_SCHEMES)
  );
}

function sanitizeMarkdownHtml(html: string): string {
  const sanitized = DOMPurify.sanitize(html, {
    ALLOWED_TAGS: MARKDOWN_ALLOWED_TAGS,
    ALLOWED_ATTR: MARKDOWN_ALLOWED_ATTRIBUTES,
    ALLOW_ARIA_ATTR: true,
    ALLOW_DATA_ATTR: false,
    ALLOW_UNKNOWN_PROTOCOLS: true,
  });

  const template = document.createElement("template");
  template.innerHTML = sanitized;

  template.content.querySelectorAll("a").forEach((element) => {
    if (element.getAttribute("target") === "_blank") {
      element.setAttribute("rel", "noopener noreferrer");
    }
    const href = element.getAttribute("href");
    if (href && !hasAllowedUrlScheme(href, LINK_SCHEMES)) {
      element.removeAttribute("href");
    }
  });

  template.content.querySelectorAll("img[src]").forEach((element) => {
    const src = element.getAttribute("src") || "";
    if (!hasAllowedImageSource(src)) {
      element.removeAttribute("src");
    }
  });

  return template.innerHTML;
}

'''
          marker = "/**\n * Service to handle markdown content loading and rendering"
          text = replace_once(text, marker, sanitizer + marker, str(path))
          text = replace_once(
              text,
              "contentArea.innerHTML = contentArea.innerHTML + markdownHtml;",
              "contentArea.innerHTML =\n            contentArea.innerHTML + sanitizeMarkdownHtml(markdownHtml);",
              str(path),
          )
          text = replace_once(
              text,
              "contentArea.innerHTML = markdownHtml;",
              "contentArea.innerHTML = sanitizeMarkdownHtml(markdownHtml);",
              str(path),
          )
          text = replace_once(
              text,
              "(contentArea as HTMLElement).innerHTML = markdownHtml;",
              "(contentArea as HTMLElement).innerHTML =\n        sanitizeMarkdownHtml(markdownHtml);",
              str(path),
          )
          old_image_check = '''if (
              /^https?:\\/\\//i.test(src) ||
              /^data:\\/\\//i.test(src) ||
              /^blob:\\/\\//i.test(src)
            )
              return;'''
          new_image_check = '''const normalizedSrc = src.trim().toLowerCase();
            if (
              normalizedSrc.startsWith("http://") ||
              normalizedSrc.startsWith("https://") ||
              normalizedSrc.startsWith("data:") ||
              normalizedSrc.startsWith("blob:")
            )
              return;'''
          if text.count(old_image_check) != 2:
              raise RuntimeError("Expected two Markdown image URL checks")
          text = text.replace(old_image_check, new_image_check)
          path.write_text(text)

          # 2) Escape and validate account-controlled popup content.
          path = Path("services/popupService.ts")
          text = path.read_text()
          helper = r'''

function escapeHtml(value: string): string {
  return value
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function sanitizeProfileImageUrl(value?: string | null): string {
  if (!value) return "";
  const normalized = value.trim();
  if (/^data:image\/(?:avif|gif|jpe?g|png|webp);base64,/iu.test(normalized)) {
    return normalized;
  }
  try {
    const parsed = new URL(normalized);
    return ["http:", "https:", "blob:"].includes(parsed.protocol)
      ? normalized
      : "";
  } catch {
    return "";
  }
}
'''
          text = replace_once(
              text,
              'import sendRuntimeMessage from "./runtimeMessage";\n',
              'import sendRuntimeMessage from "./runtimeMessage";' + helper + '\n',
              str(path),
          )
          avatar_pattern = re.compile(
              r'  createAvatarHTML\(displayText: string, profileImage\?: string \| null\): string \{.*?\n  \},',
              re.S,
          )
          avatar_replacement = '''  createAvatarHTML(displayText: string, profileImage?: string | null): string {
    const safeDisplayText = escapeHtml(displayText);
    const safeInitial = escapeHtml(displayText.charAt(0).toUpperCase());
    const safeProfileImage = sanitizeProfileImageUrl(profileImage);

    if (safeProfileImage) {
      return `<img src="${escapeHtml(safeProfileImage)}" alt="${safeDisplayText}" class="w-6 h-6 rounded-full object-cover mr-2 flex-shrink-0" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
           <div class="w-6 h-6 rounded-full bg-gradient-to-r from-purple-400 to-pink-400 flex items-center justify-center text-white text-xs font-bold mr-2 flex-shrink-0" style="display: none;">
             ${safeInitial}
           </div>`;
    }

    return `<div class="w-6 h-6 rounded-full bg-gradient-to-r from-purple-400 to-pink-400 flex items-center justify-center text-white text-xs font-bold mr-2 flex-shrink-0">
             ${safeInitial}
           </div>`;
  },'''
          text, count = avatar_pattern.subn(avatar_replacement, text, count=1)
          if count != 1:
              raise RuntimeError("Unable to replace createAvatarHTML")
          text = replace_once(
              text,
              '<div class="text-white/95 text-sm font-medium truncate">${displayText}</div>',
              '<div class="text-white/95 text-sm font-medium truncate">${escapeHtml(displayText)}</div>',
              str(path),
          )
          text = replace_once(
              text,
              '? `<div class="text-white/70 text-xs truncate">${account.name}</div>`',
              '? `<div class="text-white/70 text-xs truncate">${escapeHtml(account.name)}</div>`',
              str(path),
          )
          path.write_text(text)

          # 3) Fix Tailwind v4 utilities and account modal injection.
          path = Path("components/accountUIComponents.ts")
          text = path.read_text()
          text = text.replace("bg-gradient-to-r", "bg-linear-to-r")
          text = text.replace("bg-black bg-opacity-50", "bg-black/50")
          text = text.replace("if (!textArea.value.trim())", "if (!textArea?.value.trim())")
          account_escape_helper = r'''

function escapeHtml(value: string): string {
  return value
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}
'''
          text = replace_once(
              text,
              'import type { Account, CreateAccountOptions } from "../types";\n',
              'import type { Account, CreateAccountOptions } from "../types";' + account_escape_helper + '\n',
              str(path),
          )
          text = replace_once(
              text,
              '${\n              account.name\n            }',
              '${escapeHtml(account.name)}',
              str(path),
          )
          text = replace_once(
              text,
              '${\n              account.nickname || ""\n            }',
              '${escapeHtml(account.nickname || "")}',
              str(path),
          )
          text = replace_once(
              text,
              '<p class="font-semibold text-gray-900 mt-2">"${account.name}"</p>',
              '<p class="font-semibold text-gray-900 mt-2">"${escapeHtml(account.name)}"</p>',
              str(path),
          )
          path.write_text(text)

          # 4) Restore deep GSP lookup and URL fallback.
          path = Path("services/searchService.ts")
          text = path.read_text()
          gsp_pattern = re.compile(
              r'  static getGspId\(\): string \{.*?\n  \}\n\n  /\*\*\n   \* Create combined query text',
              re.S,
          )
          gsp_replacement = '''  static getGspId(): string {
    const h2Element =
      this.querySelectorDeep("h2") || document.querySelector("h2");
    if (h2Element) {
      const text = h2Element.textContent?.trim() || "";
      const match = text.match(/GSP\\d+/i);
      if (match) {
        const gspId = match[0].toUpperCase();
        if (import.meta.env.MODE === "development") {
          console.info("[LabService] Extracted GSP ID:", gspId);
        }
        return gspId;
      }
    }

    const urlMatch = window.location.href.match(/GSP\\d+/i);
    if (urlMatch) {
      const gspId = urlMatch[0].toUpperCase();
      if (import.meta.env.MODE === "development") {
        console.info("[LabService] Extracted GSP ID from URL:", gspId);
      }
      return gspId;
    }

    if (import.meta.env.MODE === "development") {
      console.info("[LabService] No GSP ID found");
    }
    return "";
  }

  /**
   * Create combined query text'''
          text, count = gsp_pattern.subn(gsp_replacement, text, count=1)
          if count != 1:
              raise RuntimeError("Unable to replace getGspId")
          path.write_text(text)

          # 5) Correct Facilitator and Arcade configuration keys.
          path = Path("utils/seasonConfigHelper.ts")
          text = path.read_text()
          text = replace_once(
              text,
              '''  firebaseService.setLocalConfigValue(
    "countdown_deadline_facilitator",
    arcadeDeadline,
  );

  firebaseService.setLocalConfigValue("countdown_enabled_facilitator", "true");
  firebaseService.setLocalConfigValue("countdown_enabled_arcade", "false");''',
              '''  firebaseService.setLocalConfigValue("countdown_enabled_facilitator", "false");
  firebaseService.setLocalConfigValue("countdown_enabled_arcade", "true");''',
              str(path),
          )
          text = replace_once(
              text,
              'firebaseService.setLocalConfigValue("countdown_enabled_arcade", "false");',
              'firebaseService.setLocalConfigValue(\n    "countdown_enabled_facilitator",\n    "false",\n  );',
              str(path),
          )
          text = replace_once(
              text,
              'firebaseService.setLocalConfigValue("countdown_enabled_arcade", "true");',
              'firebaseService.setLocalConfigValue(\n    "countdown_enabled_facilitator",\n    "true",\n  );',
              str(path),
          )
          text = replace_once(
              text,
              '"countdown_deadline_arcade",\n    facilitatorDeadline,',
              '"countdown_deadline_facilitator",\n    facilitatorDeadline,',
              str(path),
          )
          path.write_text(text)
          PY

      - name: Add DOMPurify dependency
        run: yarn add dompurify@^3.4.12 --ignore-scripts --ignore-engines

      - name: Prepare WXT types
        run: yarn wxt prepare

      - name: Validate changes
        run: |
          yarn compile
          yarn test:coverage
          yarn build

      - name: Commit fixes and remove temporary workflow
        shell: bash
        run: |
          rm -f .github/workflows/apply-pr180-critical-fixes.yml
          git config user.name "eplus-bot"
          git config user.email "157664013+eplus-bot@users.noreply.github.com"
          git add services/markdownService.ts services/popupService.ts services/searchService.ts components/accountUIComponents.ts utils/seasonConfigHelper.ts package.json yarn.lock .github/workflows/apply-pr180-critical-fixes.yml
          git commit -m "fix: retain critical security and compatibility fixes"
          git push origin HEAD:revert-178-dev
