name: ✨ Auto-label PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to label
        required: true
        type: number

jobs:
  update-pr:
    name: Update PR
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Gather Info
        id: check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DISPATCH_PR_NUMBER: ${{ inputs.pr_number }}
        with:
          script: |
            const prNumber = context.eventName === 'workflow_dispatch'
              ? Number(process.env.DISPATCH_PR_NUMBER)
              : context.payload.pull_request.number;

            core.setOutput('pr_number', prNumber);

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const hasAssignees = pr.assignees && pr.assignees.length > 0;
            core.setOutput('has_assignees', hasAssignees);
            core.setOutput('author', pr.user.login);

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100
              }
            );

            const rules = [
              { label: 'area: services',  test: f => f.startsWith('services/') },
              { label: 'area: ui',        test: f => f.startsWith('entrypoints/') || f.startsWith('components/') },
              { label: 'area: tests',     test: f => f.startsWith('tests/') },
              { label: 'area: i18n',      test: f => f.startsWith('public/_locales/') },
              { label: 'area: release',   test: f => f === '.github/workflows/release.yml' },
              { label: 'area: config',    test: f => /^(package\.json|yarn\.lock|.*\.config\.[a-z]+)$/.test(f) || (f.startsWith('.github/') && f !== '.github/workflows/release.yml') },
              { label: 'area: docs',      test: f => f.endsWith('.md') || f.startsWith('docs/') },
            ];

            const matched = new Set();
            for (const file of files) {
              for (const rule of rules) {
                if (rule.test(file.filename)) matched.add(rule.label);
              }
            }

            if (matched.size === 0) matched.add('area: other');

            const newLabels = Array.from(matched);
            const currentAreaLabels = pr.labels
              .map(l => l.name)
              .filter(n => n.startsWith('area:'));

            core.setOutput('labels', JSON.stringify(newLabels));
            core.setOutput('current_area_labels', JSON.stringify(currentAreaLabels));
            console.log('PR:', prNumber, '| New labels:', newLabels);
            console.log('Current area labels:', currentAreaLabels);

      - name: Sync Author
        if: steps.check.outputs.has_assignees == 'false'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ steps.check.outputs.pr_number }}
          PR_AUTHOR: ${{ steps.check.outputs.author }}
        with:
          script: |
            try {
              const prNumber = Number(process.env.PR_NUMBER);
              const author = process.env.PR_AUTHOR;

              if (!Number.isInteger(prNumber) || !author) {
                throw new Error('Invalid PR number or author output');
              }

              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                assignees: [author]
              });
              console.log('Assigned PR author:', author);
            } catch (err) {
              console.warn('Error assigning author:', err.message);
            }

      - name: Sync Labels
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ steps.check.outputs.pr_number }}
          NEW_LABELS: ${{ steps.check.outputs.labels }}
          CURRENT_AREA_LABELS: ${{ steps.check.outputs.current_area_labels }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const newLabels = JSON.parse(process.env.NEW_LABELS || '[]');
            const currentLabels = JSON.parse(process.env.CURRENT_AREA_LABELS || '[]');

            if (!Number.isInteger(prNumber)) {
              throw new Error('Invalid PR number output');
            }

            const toAdd = newLabels.filter(l => !currentLabels.includes(l));
            const toRemove = currentLabels.filter(l => !newLabels.includes(l));

            if (toAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: toAdd
              });
              console.log('Added:', toAdd);
            }

            for (const label of toRemove) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: label
              });
              console.log('Removed:', label);
            }

            if (toAdd.length === 0 && toRemove.length === 0) {
              console.log('No label changes needed');
            }
