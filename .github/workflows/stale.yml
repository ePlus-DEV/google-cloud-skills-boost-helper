name: Stale

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale issues & PRs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@28ca1036281a5e5922ead5184a1bbf96e5fc984e # v9.0.0
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been inactive for 30 days and will be closed in 7 days
            unless there is new activity. If this is still relevant, please leave a comment.
          stale-pr-message: >
            This pull request has been inactive for 30 days and will be closed in 7 days
            unless there is new activity. Please rebase and update if you intend to continue.
          close-issue-message: Closed due to inactivity. Feel free to reopen if still relevant.
          close-pr-message: Closed due to inactivity. Feel free to reopen if still relevant.
          exempt-issue-labels: "pinned,security,bug,in progress"
          exempt-pr-labels: "pinned,security,in progress"
          exempt-draft-pr: true
