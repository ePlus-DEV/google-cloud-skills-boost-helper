name: React Doctor diagnostics

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: react-doctor-diagnostics-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.head_ref == 'fix/v1.2.15-dev-main-conflict'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.x
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts --ignore-engines

      - name: Run React Doctor diagnostics
        id: doctor
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git diff --name-only "$BASE_SHA" HEAD > changed-files.txt

          set +e
          npm exec --yes --package react-doctor@0.3.0 -- \
            react-doctor . \
            --json \
            --json-compact \
            --blocking error \
            --project "*" \
            --changed-files-from changed-files.txt \
            > react-doctor-report.json \
            2> react-doctor-stderr.txt
          status=$?
          set -e

          echo "$status" > react-doctor-exit-code.txt
          cat react-doctor-stderr.txt
          cat react-doctor-report.json

      - name: Upload diagnostic report
        uses: actions/upload-artifact@v7
        with:
          name: react-doctor-diagnostics
          path: |
            changed-files.txt
            react-doctor-report.json
            react-doctor-stderr.txt
            react-doctor-exit-code.txt
          retention-days: 1
