name: Apply DeepSource fixes

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: apply-deepsource-fixes-176
  cancel-in-progress: false

jobs:
  apply-fixes:
    if: github.head_ref == 'fix/v1.2.15-dev-main-conflict'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.0
        with:
          fetch-depth: 0
          ref: fix/v1.2.15-dev-main-conflict

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.x
          cache: yarn

      - name: Patch DeepSource findings
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          markdown_path = Path('services/markdownService.ts')
          markdown = markdown_path.read_text()

          old_helper = '''const URL_CONTROL_OR_WHITESPACE = /[\\u0000-\\u0020\\u007f-\\u009f]/g;

          function hasAllowedUrlScheme(
            value: string,
            allowedSchemes: ReadonlySet<string>,
          ): boolean {
            const normalized = value.replace(URL_CONTROL_OR_WHITESPACE, "").trim();
            const scheme = normalized.match(/^([a-z][a-z0-9+.-]*):/i)?.[1];
            return !scheme || allowedSchemes.has(scheme.toLowerCase());
          }
          '''
          new_helper = '''/**
           * Checks whether a URL uses one of the explicitly allowed schemes.
           * ASCII control characters and whitespace are ignored before parsing.
           */
          function hasAllowedUrlScheme(
            value: string,
            allowedSchemes: ReadonlySet<string>,
          ): boolean {
            const normalized = Array.from(value)
              .filter((character) => {
                const codePoint = character.codePointAt(0);
                return (
                  codePoint !== undefined &&
                  codePoint > 0x20 &&
                  (codePoint < 0x7f || codePoint > 0x9f)
                );
              })
              .join("")
              .trim();
            const scheme = normalized.match(/^([a-z][a-z0-9+.-]*):/i)?.[1];
            return !scheme || allowedSchemes.has(scheme.toLowerCase());
          }
          '''

          if old_helper in markdown:
              markdown = markdown.replace(old_helper, new_helper, 1)
          elif new_helper not in markdown:
              raise RuntimeError('Markdown URL helper block was not found')
          markdown_path.write_text(markdown)

          search_path = Path('services/searchService.ts')
          search = search_path.read_text()
          old_visit = '''    const visit = (searchRoot: Document | ShadowRoot): void => {
          '''
          new_visit = '''    /** Recursively visits a document or shadow root to collect nested roots. */
              const visit = (searchRoot: Document | ShadowRoot): void => {
          '''
          if old_visit in search:
              search = search.replace(old_visit, new_visit, 1)
          elif new_visit not in search:
              raise RuntimeError('Shadow-root visit callback was not found')
          search_path.write_text(search)

          test_path = Path('tests/services/markdownService.test.ts')
          test = test_path.read_text()
          old_text = '        text: async () => markdown,\n'
          new_text = '        text: vi.fn().mockResolvedValue(markdown),\n'
          if old_text in test:
              test = test.replace(old_text, new_text, 1)
          elif new_text not in test:
              raise RuntimeError('Markdown response text mock was not found')
          test_path.write_text(test)
          PY

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts --ignore-engines

      - name: Prepare WXT types
        run: yarn wxt prepare

      - name: TypeScript compile
        run: yarn compile

      - name: Unit tests with coverage
        run: yarn test:coverage

      - name: Production build
        run: yarn build

      - name: Commit fixes
        shell: bash
        run: |
          git config user.name "ePlus Bot"
          git config user.email "dev@eplus.dev"
          git add services/markdownService.ts services/searchService.ts tests/services/markdownService.test.ts

          if git diff --cached --quiet; then
            echo "DeepSource fixes are already applied."
            exit 0
          fi

          git commit -m "fix: address DeepSource JavaScript findings"
          git push origin HEAD:fix/v1.2.15-dev-main-conflict
