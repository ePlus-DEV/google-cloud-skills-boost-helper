name: Finalize remaining PR 180 review fixes

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.ref == 'revert-178-dev' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: revert-178-dev
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Apply remaining fixes
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          markdown = Path('services/markdownService.ts')
          text = markdown.read_text()
          text = text.replace(
              '        chrome.tabs.create({ url });',
              '        await chrome.tabs.create({ url });',
          )
          markdown.write_text(text)

          install = Path('INSTALL.md')
          text = install.read_text()
          text = text.replace('([latest release desirable]', '([latest release]')
          text = text.replace('## Available Stores', '## Stores and Downloads')
          text = text.replace(
              'You can download the extension from the following official stores:',
              'Chrome and Firefox are available from their official stores. Edge and Opera users can download compatible packages from GitHub Releases.',
          )
          text = text.replace('Microsoft Edge Add-ons', 'Microsoft Edge download')
          text = text.replace('Opera Add-ons', 'Opera download')
          text = text.replace(
              '**Note:** For browsers not listed above, you can manually install the extension by following the installation instructions provided earlier.',
              'For other Chromium-based browsers, follow the manual installation instructions above.',
          )
          install.write_text(text)
          PY

      - name: Validate
        run: |
          yarn install --frozen-lockfile --ignore-scripts --ignore-engines
          yarn wxt prepare
          yarn compile
          yarn test:coverage
          yarn build

      - name: Commit and push
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No remaining changes."
            exit 0
          fi
          git config user.name "eplus-bot"
          git config user.email "157664013+eplus-bot@users.noreply.github.com"
          git add INSTALL.md services/markdownService.ts
          git commit -m "fix: address remaining PR review findings"
          git push origin HEAD:revert-178-dev
