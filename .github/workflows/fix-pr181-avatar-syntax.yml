name: Fix PR 181 avatar syntax

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

concurrency:
  group: fix-pr181-avatar-syntax
  cancel-in-progress: true

jobs:
  fix:
    if: github.event.pull_request.number == 181
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v7
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.EPLUS_BOT_TOKEN }}

      - name: Wait for workflow cleanup and sync main
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..30}; do
            git fetch origin main
            if ! git cat-file -e origin/main:.github/workflows/fix-pr181-avatar-syntax.yml 2>/dev/null; then
              git config user.name "eplus-bot"
              git config user.email "157664013+eplus-bot@users.noreply.github.com"
              git merge --no-edit origin/main
              exit 0
            fi
            echo "Waiting for temporary workflow cleanup on main ($attempt/30)..."
            sleep 2
          done
          echo "::error::Temporary workflow was not removed from main."
          exit 1

      - name: Repair avatar method
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          path = Path("services/popupService.ts")
          text = path.read_text()

          text = text.replace("}\n\n\n/**\n * Return a profile image URL", "}\n\n/**\n * Return a profile image URL", 1)

          start_marker = "  createAvatarHTML(displayText: string, profileImage?: string | null): string {"
          next_marker = "\n\n  /**\n   * Create account item element"
          start = text.find(start_marker)
          end = text.find(next_marker, start)
          if start < 0 or end < 0:
              raise RuntimeError("Could not locate createAvatarHTML block")

          replacement = '''  createAvatarHTML(displayText: string, profileImage?: string | null): string {
            const safeDisplayText = escapeHtml(displayText);
            const safeInitial = escapeHtml(displayText.charAt(0).toUpperCase());
            const safeProfileImage = sanitizeProfileImageUrl(profileImage);

            if (safeProfileImage) {
              return `<img src="${escapeHtml(safeProfileImage)}" alt="${safeDisplayText}" class="w-6 h-6 rounded-full object-cover mr-2 flex-shrink-0" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                   <div class="w-6 h-6 rounded-full bg-gradient-to-r from-purple-400 to-pink-400 flex items-center justify-center text-white text-xs font-bold mr-2 flex-shrink-0" style="display: none;">
                     ${safeInitial}
                   </div>`;
            }

            return `<div class="w-6 h-6 rounded-full bg-gradient-to-r from-purple-400 to-pink-400 flex items-center justify-center text-white text-xs font-bold mr-2 flex-shrink-0">
                     ${safeInitial}
                   </div>`;
          },'''

          text = text[:start] + replacement + text[end:]
          path.write_text(text)
          PY

          rm -f .github/.trigger-pr181-avatar-syntax

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Validate
        run: |
          yarn install --frozen-lockfile --ignore-scripts --ignore-engines
          yarn wxt prepare
          yarn compile
          yarn test:coverage
          yarn build

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "eplus-bot"
          git config user.email "157664013+eplus-bot@users.noreply.github.com"
          git add -A
          git commit -m "fix: repair popup avatar URL validation"
          git push origin HEAD:dev
