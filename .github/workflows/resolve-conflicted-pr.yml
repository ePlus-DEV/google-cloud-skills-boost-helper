name: Resolve conflicted PR

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: read
  issues: read

jobs:
  resolve:
    name: Resolve PR 176
    if: >-
      github.event.issue.pull_request &&
      github.event.issue.number == 176 &&
      github.event.comment.body == '/resolve-dev-main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout conflict-fix branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: fix/v1.2.15-dev-main-conflict

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: yarn

      - name: Merge main while preserving dev cleanup
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "ePlus Bot"
          git config user.email "dev@eplus.dev"
          git fetch origin main

          set +e
          git merge origin/main --no-ff --no-commit
          merge_status=$?
          set -e

          if [ "$merge_status" -ne 0 ]; then
            mapfile -d '' conflicted_files < <(git diff --name-only --diff-filter=U -z)

            if [ "${#conflicted_files[@]}" -eq 0 ]; then
              echo "Merge failed without conflict files."
              exit "$merge_status"
            fi

            printf 'Keeping dev versions for conflicted files:\n'
            printf ' - %s\n' "${conflicted_files[@]}"
            git checkout --ours -- "${conflicted_files[@]}"
            git add -- "${conflicted_files[@]}"
          fi

      - name: Update active dependencies and lockfile
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));

          const updates = {
            '@tailwindcss/vite': '^4.3.3',
            firebase: '^12.16.0',
            'fuse.js': '^7.5.0',
            marked: '^18.0.6',
          };

          for (const [name, version] of Object.entries(updates)) {
            if (pkg.dependencies?.[name]) {
              pkg.dependencies[name] = version;
            }
          }

          if (pkg.devDependencies?.wxt) {
            pkg.devDependencies.wxt = '^0.20.27';
          }

          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

          sed -i 's#actions/setup-node@v6#actions/setup-node@v7#g' \
            .github/workflows/ci.yml \
            .github/workflows/release.yml

          corepack enable
          yarn install --ignore-scripts --ignore-engines

      - name: Validate
        shell: bash
        run: |
          yarn compile
          yarn test
          yarn build

      - name: Commit and push resolved merge
        shell: bash
        run: |
          rm -f .github/workflows/resolve-dev-main-conflict.yml
          git add -A
          git commit -m "chore: resolve dev-main conflict without restoring unused code"
          git push origin HEAD:fix/v1.2.15-dev-main-conflict
