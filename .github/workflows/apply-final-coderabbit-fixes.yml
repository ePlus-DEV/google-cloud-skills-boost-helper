name: Apply final CodeRabbit fixes

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: apply-final-coderabbit-fixes-176
  cancel-in-progress: false

jobs:
  apply-fixes:
    if: github.head_ref == 'fix/v1.2.15-dev-main-conflict'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.0
        with:
          fetch-depth: 0
          ref: fix/v1.2.15-dev-main-conflict

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.x
          cache: yarn

      - name: Patch README and markdown links
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          readme_path = Path('README.md')
          readme = readme_path.read_text()
          reference = '[Manual Installation]: INSTALL.md\n'
          if reference not in readme:
              marker = '[License]: LICENSE.md\n'
              if marker not in readme:
                  raise RuntimeError('README reference footer was not found')
              readme = readme.replace(marker, marker + reference, 1)
              readme_path.write_text(readme)

          service_path = Path('services/markdownService.ts')
          service = service_path.read_text()
          old_schemes = 'const linkSchemes = new Set(["http", "https", "mailto"]);'
          new_schemes = 'const linkSchemes = new Set(["http", "https"]);'
          if old_schemes in service:
              service_path.write_text(service.replace(old_schemes, new_schemes, 1))
          elif new_schemes not in service:
              raise RuntimeError('Markdown link allowlist was not found')

          test_path = Path('tests/services/markdownService.test.ts')
          test = test_path.read_text()
          mailto_fixture = '      \'<a class="mail-link" href="mailto:dev@example.com">Mail</a>\',\n'
          if mailto_fixture not in test:
              safe_fixture = '      \'<a class="safe-link" href="https://example.com/docs">Safe</a>\',\n'
              if safe_fixture not in test:
                  raise RuntimeError('Safe markdown link fixture was not found')
              test = test.replace(safe_fixture, safe_fixture + mailto_fixture, 1)

          mailto_assertion = '''    expect(document.querySelector(".mail-link")?.hasAttribute("href")).toBe(
              false,
            );
          '''
          if mailto_assertion not in test:
              safe_assertion = '''    expect(document.querySelector(".safe-link")?.getAttribute("href")).toBe(
                "https://example.com/docs",
              );
          '''
              if safe_assertion not in test:
                  raise RuntimeError('Safe markdown link assertion was not found')
              test = test.replace(
                  safe_assertion,
                  safe_assertion + mailto_assertion,
                  1,
              )

          test_path.write_text(test)
          PY

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts --ignore-engines

      - name: Prepare WXT types
        run: yarn wxt prepare

      - name: TypeScript compile
        run: yarn compile

      - name: Unit tests with coverage
        run: yarn test:coverage

      - name: Production build
        run: yarn build

      - name: Commit fixes
        shell: bash
        run: |
          git config user.name "ePlus Bot"
          git config user.email "dev@eplus.dev"
          git add README.md services/markdownService.ts tests/services/markdownService.test.ts

          if git diff --cached --quiet; then
            echo "Final CodeRabbit fixes are already applied."
            exit 0
          fi

          git commit -m "fix: align sanitized markdown link behavior"
          git push origin HEAD:fix/v1.2.15-dev-main-conflict
