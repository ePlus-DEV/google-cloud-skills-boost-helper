name: Fix PR 178 CodeRabbit findings v2

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

concurrency:
  group: fix-pr178-coderabbit-v2
  cancel-in-progress: false

jobs:
  apply-fixes:
    if: github.event.pull_request.number == 178 && github.head_ref == 'dev'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.0
        with:
          ref: dev
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.x
          cache: yarn

      - name: Apply review fixes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          from textwrap import dedent
          import re

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  if new in text:
                      return
                  raise RuntimeError(f'Expected content not found in {path}')
              file.write_text(text.replace(old, new, 1))

          replace_once(
              '.github/workflows/pr-labeler.yml',
              dedent('''\
                          const { data: files } = await github.rest.pulls.listFiles({
                            owner: context.repo.owner,
                            repo: context.repo.repo,
                            pull_number: prNumber
                          });
              '''),
              dedent('''\
                          const files = await github.paginate(
                            github.rest.pulls.listFiles,
                            {
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              pull_number: prNumber,
                              per_page: 100
                            }
                          );
              '''),
          )

          replace_once(
              '.github/workflows/stale.yml',
              '      - uses: actions/stale@v9\n',
              '      - uses: actions/stale@28ca1036281a5e5922ead5184a1bbf96e5fc984e # v9.0.0\n',
          )

          readme = Path('README.md')
          text = readme.read_text()
          privacy = '[Privacy Policy]: https://eplus.dev/privacy-policy'
          if privacy not in text:
              marker = '[Manual Installation]: INSTALL.md\n'
              if marker not in text:
                  raise RuntimeError('README reference block not found')
              readme.write_text(text.replace(marker, marker + privacy + '\n', 1))

          markdown = Path('services/markdownService.ts')
          text = markdown.read_text()

          helpers = dedent('''\
              const LINK_SCHEMES = new Set(["http", "https"]);
              const IMAGE_SCHEMES = new Set(["http", "https", "blob"]);
              const SAFE_DATA_IMAGE_SOURCE =
                /^data:image\\/(?:avif|gif|jpe?g|png|webp);base64,[a-z0-9+/=\\s]+$/iu;

              /** Removes ASCII control characters and whitespace before URL parsing. */
              function normalizeUrlForSchemeCheck(value: string): string {
                return Array.from(value)
                  .filter((character) => {
                    const codePoint = character.codePointAt(0);
                    return (
                      codePoint !== undefined &&
                      codePoint > 0x20 &&
                      (codePoint < 0x7f || codePoint > 0x9f)
                    );
                  })
                  .join("")
                  .trim();
              }

              /** Checks whether a URL uses one of the explicitly allowed schemes. */
              function hasAllowedUrlScheme(
                value: string,
                allowedSchemes: ReadonlySet<string>,
              ): boolean {
                const normalized = normalizeUrlForSchemeCheck(value);
                const scheme = normalized.match(/^([a-z][a-z0-9+.-]*):/iu)?.[1];
                return !scheme || allowedSchemes.has(scheme.toLowerCase());
              }

              /** Allows relative, HTTP(S), blob, and safe raster data-image sources. */
              function hasAllowedImageSource(value: string): boolean {
                const normalized = normalizeUrlForSchemeCheck(value);
                return (
                  SAFE_DATA_IMAGE_SOURCE.test(normalized) ||
                  hasAllowedUrlScheme(value, IMAGE_SCHEMES)
                );
              }

          ''')
          text, helper_count = re.subn(
              r'/\*\*\n \* Checks whether a URL uses one of the explicitly allowed schemes\.[\s\S]*?(?=/\*\* Sanitizes rendered markdown)',
              helpers,
              text,
              count=1,
          )
          if helper_count != 1:
              raise RuntimeError('URL helper block not found')

          sanitizer = dedent('''\
              /** Sanitizes rendered markdown with an explicit tag and attribute allowlist. */
              function sanitizeMarkdownHtml(html: string): string {
                const sanitized = DOMPurify.sanitize(html, {
                  ALLOWED_TAGS: MARKDOWN_ALLOWED_TAGS,
                  ALLOWED_ATTR: MARKDOWN_ALLOWED_ATTRIBUTES,
                  ALLOW_ARIA_ATTR: true,
                  ALLOW_DATA_ATTR: false,
                  // Candidate schemes remain only until the strict checks below run.
                  ALLOW_UNKNOWN_PROTOCOLS: true,
                });

                const template = document.createElement("template");
                template.innerHTML = sanitized;

                template.content.querySelectorAll("a").forEach((element) => {
                  if (element.getAttribute("target") === "_blank") {
                    element.setAttribute("rel", "noopener noreferrer");
                  }

                  const href = element.getAttribute("href");
                  if (href && !hasAllowedUrlScheme(href, LINK_SCHEMES)) {
                    element.removeAttribute("href");
                  }
                });

                template.content.querySelectorAll("img[src]").forEach((element) => {
                  const src = element.getAttribute("src") || "";
                  if (!hasAllowedImageSource(src)) {
                    element.removeAttribute("src");
                  }
                });

                return template.innerHTML;
              }

          ''')
          text, sanitizer_count = re.subn(
              r'/\*\* Sanitizes rendered markdown[\s\S]*?(?=/\*\*\n \* Service to handle markdown)',
              sanitizer,
              text,
              count=1,
          )
          if sanitizer_count != 1:
              raise RuntimeError('Markdown sanitizer block not found')

          rewrite_pattern = re.compile(
              r'(?P<indent>\s*)if \(\s*'
              r'/\^https\?:\\/\\//i\.test\(src\) \|\|\s*'
              r'/\^data:\\/\//i\.test\(src\) \|\|\s*'
              r'/\^blob:\\/\//i\.test\(src\)\s*'
              r'\)\s*return;',
          )

          def replace_rewrite(match: re.Match[str]) -> str:
              indent = match.group('indent')
              return (
                  f'{indent}const normalizedSrc = src.trim().toLowerCase();\n'
                  f'{indent}if (\n'
                  f'{indent}  normalizedSrc.startsWith("http://") ||\n'
                  f'{indent}  normalizedSrc.startsWith("https://") ||\n'
                  f'{indent}  normalizedSrc.startsWith("data:") ||\n'
                  f'{indent}  normalizedSrc.startsWith("blob:")\n'
                  f'{indent})\n'
                  f'{indent}  return;'
              )

          text, rewrite_count = rewrite_pattern.subn(replace_rewrite, text)
          if rewrite_count != 2:
              raise RuntimeError(f'Expected 2 image rewrite blocks, found {rewrite_count}')
          markdown.write_text(text)

          replace_once(
              'services/optionsService.ts',
              '      await this.switchAccount(newAccount.id);\n      await this.loadAccounts();\n',
              '      await this.switchAccount(newAccount.id);\n',
          )

          Path('tests/services/markdownService.test.ts').write_text(dedent('''\
              import { afterEach, beforeEach, describe, expect, it, vi } from "vitest";
              import MarkdownService from "../../services/markdownService";

              describe("MarkdownService sanitization", () => {
                beforeEach(() => {
                  document.body.innerHTML = `
                    <div id="markdown-container">
                      <div class="markdown-content"></div>
                    </div>
                  `;
                });

                afterEach(() => {
                  document.body.innerHTML = "";
                  vi.unstubAllGlobals();
                  vi.restoreAllMocks();
                });

                it("sanitizes links and preserves only supported image sources", async () => {
                  const markdown = [
                    '<a class="unsafe-link" href="java&#10;script:alert(1)">Unsafe</a>',
                    '<map><area class="unsafe-area" href="javascript:alert(1)"></map>',
                    '<img class="safe-image" src="https://example.com/image.png" onerror="alert(1)">',
                    '<a class="safe-link" href="https://example.com/docs">Safe</a>',
                    '<a class="blank-link" href="https://example.com/new" target="_blank">Blank</a>',
                    '<a class="mail-link" href="mailto:dev@example.com">Mail</a>',
                    '<img class="data-image" src="data:image/png;base64,iVBORw0KGgo=">',
                    '<img class="blob-image" src="blob:https://example.com/image-id">',
                    '<img class="svg-data-image" src="data:image/svg+xml;base64,PHN2Zz4=">',
                  ].join("\\n");

                  vi.stubGlobal(
                    "fetch",
                    vi.fn().mockResolvedValue({
                      ok: true,
                      status: 200,
                      text: vi.fn().mockResolvedValue(markdown),
                    }),
                  );

                  const rendered = await MarkdownService.renderUrlToContainer(
                    "https://example.com/readme.md",
                    "markdown-container",
                  );

                  expect(rendered).toBe(true);
                  expect(document.querySelector(".unsafe-area")).toBeNull();
                  const unsafeLink = document.querySelector(".unsafe-link");
                  expect(unsafeLink === null || !unsafeLink.hasAttribute("href")).toBe(true);
                  expect(document.querySelector(".safe-image")?.hasAttribute("onerror")).toBe(false);
                  expect(document.querySelector(".safe-image")?.getAttribute("src")).toBe(
                    "https://example.com/image.png",
                  );
                  expect(document.querySelector(".safe-link")?.getAttribute("href")).toBe(
                    "https://example.com/docs",
                  );
                  expect(
                    document.querySelector(".blank-link")?.getAttribute("rel")?.split(" "),
                  ).toEqual(expect.arrayContaining(["noopener", "noreferrer"]));
                  expect(document.querySelector(".mail-link")?.hasAttribute("href")).toBe(false);
                  expect(document.querySelector(".data-image")?.getAttribute("src")).toBe(
                    "data:image/png;base64,iVBORw0KGgo=",
                  );
                  expect(document.querySelector(".blob-image")?.getAttribute("src")).toBe(
                    "blob:https://example.com/image-id",
                  );
                  expect(
                    document.querySelector(".svg-data-image")?.hasAttribute("src"),
                  ).toBe(false);
                });
              });
          '''))
          PY

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts --ignore-engines

      - name: Prepare WXT types
        run: yarn wxt prepare

      - name: TypeScript compile
        run: yarn compile

      - name: Unit tests with coverage
        run: yarn test:coverage

      - name: Production build
        run: yarn build

      - name: Commit fixes
        shell: bash
        run: |
          git config user.name "ePlus Bot"
          git config user.email "dev@eplus.dev"
          git add \
            .github/workflows/pr-labeler.yml \
            .github/workflows/stale.yml \
            README.md \
            services/markdownService.ts \
            services/optionsService.ts \
            tests/services/markdownService.test.ts
          rm -f .github/.trigger-pr178
          git add -u
          git commit -m "fix: address CodeRabbit review findings"
          git push origin HEAD:dev
