name: Apply PR 180 search script

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'revert-178-dev' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: revert-178-dev
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Apply search fixes
        run: python .github/scripts/fix-pr180-search.py

      - name: Validate
        run: |
          yarn install --frozen-lockfile --ignore-scripts --ignore-engines
          yarn wxt prepare
          yarn compile
          yarn test:coverage
          yarn build

      - name: Commit and push
        shell: bash
        run: |
          rm -f .github/scripts/fix-pr180-search.py
          rm -f .github/.trigger-pr180-search-fixes*
          git config user.name "eplus-bot"
          git config user.email "157664013+eplus-bot@users.noreply.github.com"
          git add -A
          git commit -m "fix: prevent duplicate search queries and recurse shadow roots"
          git push origin HEAD:revert-178-dev
